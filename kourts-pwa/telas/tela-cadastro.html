<!DOCTYPE html>
<html>
<head>
 <meta charset='utf-8'>
 <meta http-equiv='X-UA-Compatible' content='IE=edge'>
 <title>Page Title</title>
 <meta name='viewport' content='width=device-width, initial-scale=1'>
 <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
 <script src='main.js'></script>
</head>
<body>
 <header>
  <a id="voltar" href=""> &#10140 </a>

  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="icon-kourts" width="100px" height="100px">
  
  <h1> Tela de Cadastro </h1>
 </header>
 <main>
  <form>
   <label for="nome"> Nome: </label> <br>
         <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo"><br>

         <label for="sobrenome"> Sobrenome: </label><br>
         <input type="text" name="sobrenome" id="sobrenome"><br>

         <label for="cpf"> CPF: </label><br>
         <input type="cpf" name="cpf" id="cpf"><br>

         <label for="usuario"> Usuário: </label><br>
         <input type="text" name="usuario" id="usuario"><br>

         <label for="email"> E-mail: </label><br>
         <input type="email" id="email" name="email" placeholder="Digite seu e-mail"><br>

         <label for="confirmar-email"> Confirmar email: </label><br>
         <input type="email" id="confirmar-email" name="confirmar-email"><br>

         <label for="telefone"> Telefone: </label><br>
         <input type="tel" name="telefone" id="telefone"><br>

         <label for="estado"> Estado: </label><br>
         <input type="text" name="estado" id="estado"><br>

         <label for="cidade"> Cidade: </label><br>
         <input type="text" name="cidade" id="cidade"><br>

         <label for="bairro"> Bairro: </label><br>
         <input type="text" name="bairro" id="bairro"><br>

         <label for="senha"> Senha: </label><br>
         <input type="password" name="senha" id="senha"><br>

          <label for="senha"> Confirmar Senha: </label><br>
          <input type="password" name="confirmar-senha" id="confirmar-senha"><br>

         <button type="submit"> Cadastrar </button>
     </form>
 </main>
 <footer>
     <button> <img src="png/home.png" alt="icon-home"> </button>

     <button> <img src="png/calendar.png" alt="icon-calendar"> </button>

     <button> <img src="png/user.png" alt="icon-user"> </button>
 </footer>
</body>
</html>
