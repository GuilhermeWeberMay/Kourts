<!DOCTYPE html>
<html>
<head>
 <meta charset='utf-8'>
 <meta http-equiv='X-UA-Compatible' content='IE=edge'>
 <title>Page Title</title>
 <meta name='viewport' content='width=device-width, initial-scale=1'>
 <link rel='stylesheet' type='text/css' media='screen' href='telaCadastro.css'>
</head>
<body>
   <form>
    <fieldset>
        <img src="logoKourtss.png" alt="logo" width="75" height="75"> <br>

        <div>

        <label> Nome da empresa : </label> <br>
        <input type="text" name="nomeEmp" placeholder="Nome da empresa" autofocus> <br>  <br>

        <label> E-mail : </label> <br>
        <input type="text" name="email" placeholder="Email" > <br>  <br>

        <label> Confirmar e-mail : </label> <br>
        <input type="text" name="confEmail" placeholder="Confirmar o email" > <br> <br>

        <label> CNPJ : </label> <br>
        <input type="number" name="cnpj" placeholder="CNPJ" > <br> <br>

        <label> Telefone : </label> <br>
        <input type="tel" name="telefone" placeholder="telefone" > <br> <br>

        <label> Senha : </label> <br>
        <input type="text" name="senha" placeholder="senha" > <br> <br>

        <label> Confirmar senha : </label> <br>
        <input type="text" name="confSenha" placeholder="Confirmar senha" > <br>  <br>

        </div>
    

        <button> CADASTRAR </button>

    </fieldset>
   </form>
 
 <!--<script src='main.js'></script>-->
</body>
</html>
